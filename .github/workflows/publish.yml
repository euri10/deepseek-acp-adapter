# Publish to crates.io on version tags
#
# Two authentication modes, tried in order:
#
#   1. **Trusted Publishing (OIDC)** — preferred, no stored secrets.
#      Configure at https://crates.io/crates/deepseek-acp-adapter/settings
#      under "Trusted Publishing" → "Add":
#        Publisher:          GitHub
#        Namespace:          <your username/org>
#        Project:            deepseek-acp-adapter
#        Workflow filename:  publish.yml
#        Environment:        release  (optional)
#
#   2. **API token fallback** — needed for the FIRST publish (the crate
#      must exist before Trusted Publishing can be configured).
#        - Generate a token at https://crates.io/settings/tokens
#        - Add it as a GitHub Actions secret named `CARGO_REGISTRY_TOKEN`:
#          https://github.com/<user>/deepseek-acp-adapter/settings/secrets/actions
#
# Release flow:
#   git tag v0.1.0
#   git push origin main --tags
#
# The crate version in Cargo.toml must match the git tag.

name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: "cargo publish"
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # for OIDC token exchange
      contents: read

    environment: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      # ------------------------------------------------------------------
      # Validate the package before publishing
      # ------------------------------------------------------------------
      - name: cargo publish --dry-run
        run: cargo publish --dry-run

      # ------------------------------------------------------------------
      # Obtain a crates.io token.
      #
      # Strategy:
      #   1. Try Trusted Publishing (OIDC) — yields a short-lived token.
      #   2. If OIDC isn't configured yet, fall back to the
      #      CARGO_REGISTRY_TOKEN secret.
      #
      # The OIDC step is allowed to fail; we check its outcome below.
      # ------------------------------------------------------------------
      - name: Get crates.io token via OIDC
        id: oidc
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish (with OIDC token)
        if: steps.oidc.outcome == 'success'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.oidc.outputs.token }}

      - name: Publish (with API token secret fallback)
        if: steps.oidc.outcome != 'success'
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::No crates.io token available."
            echo "Either configure Trusted Publishing at"
            echo "https://crates.io/crates/deepseek-acp-adapter/settings"
            echo "or add CARGO_REGISTRY_TOKEN to GitHub Secrets."
            exit 1
          fi
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

